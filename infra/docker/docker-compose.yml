services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-recommender-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_recommender}
      POSTGRES_USER: ${POSTGRES_USER:-retail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_password}
    ports:
      - "5432:5432"
    volumes:
      - retail_recommender_pgdata:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail_recommender}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: retail-recommender-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-retail_user}:${POSTGRES_PASSWORD:-retail_password}@postgres:5432/${POSTGRES_DB:-retail_recommender}
    ports:
      - "8000:8000"
    volumes:
      - ../../artifacts/models:/app/artifacts/models:ro
      - ../../data/raw/instacart:/app/data/raw/instacart:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  retail_recommender_pgdata:
