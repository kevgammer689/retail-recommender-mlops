services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-recommender-postgres
    environment:
      POSTGRES_DB: retail_recommender
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    ports:
      - "5432:5432"
    volumes:
      - retail_recommender_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_recommender"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  retail_recommender_pgdata:
